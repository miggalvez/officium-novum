name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validation:
    name: Validation gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      - name: Typecheck workspace
        run: pnpm -r typecheck

      - name: Test workspace
        run: pnpm -r test

      - name: Verify 2024 adjudication sign-off
        run: pnpm -C packages/compositor verify:phase-3-signoff
